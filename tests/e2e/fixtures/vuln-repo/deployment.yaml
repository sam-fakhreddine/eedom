apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vuln-app
  template:
    metadata:
      labels:
        app: vuln-app
    spec:
      containers:
        - name: vuln-app
          image: vuln-app:latest
          securityContext:
            privileged: true
            runAsRoot: true
          ports:
            - containerPort: 8080
