name: GATEKEEPER — Dependency & Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Enforcement mode (block, warn, log)"
        required: false
        default: "warn"
        type: choice
        options:
          - block
          - warn
          - log

permissions:
  contents: read

env:
  UV_CACHE_DIR: /tmp/uv-cache
  SCANNER_BIN: /tmp/scanner-bin
  TRIVY_CACHE_DIR: /tmp/trivy-cache
  SCANNER_VERSIONS: trivy=0.70.0 osv=2.3.5 kube-linter=0.8.3 gitleaks=8.30.1 pmd=7.9.0 opengrep=1.20.0 syft=1.43.0 scancode=32.3.0

jobs:

  # ── Preflight: detect docs-only PRs ──

  preflight:
    name: Preflight
    if: >-
      github.event_name != 'pull_request' ||
      (
        github.event.pull_request.draft == false &&
        !startsWith(github.head_ref || '', 'release-please--')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      api_contract: ${{ steps.classify.outputs.api_contract }}
      api_contract_reason: ${{ steps.classify.outputs.api_contract_reason }}
      full_e2e: ${{ steps.classify.outputs.full_e2e }}
      full_e2e_reason: ${{ steps.classify.outputs.full_e2e_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Classify PR changes
        if: github.event_name == 'pull_request'
        id: classify
        run: |
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          CODE_CHANGES=$(printf '%s\n' "$CHANGED_FILES" | grep -cvE '\.(md|txt)$|^docs/|^LICENSE|^CODEOWNERS|^\.github/ISSUE_TEMPLATE/' || true)
          if [ "$CODE_CHANGES" -eq 0 ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only PR — skipping review"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

          API_CONTRACT_CHANGES=""
          while IFS= read -r changed_path; do
            case "$changed_path" in
              tests/contract/*|\
              src/eedom/cli/main.py|\
              src/eedom/core/actionability.py|\
              src/eedom/core/bootstrap.py|\
              src/eedom/core/config.py|\
              src/eedom/core/diff.py|\
              src/eedom/core/ignore.py|\
              src/eedom/core/json_report.py|\
              src/eedom/core/manifest_discovery.py|\
              src/eedom/core/orchestrator.py|\
              src/eedom/core/pipeline.py|\
              src/eedom/core/pipeline_helpers.py|\
              src/eedom/core/plugin.py|\
              src/eedom/core/registry.py|\
              src/eedom/core/renderer.py|\
              src/eedom/core/repo_config.py|\
              src/eedom/core/sarif.py|\
              src/eedom/core/use_cases.py|\
              src/eedom/plugins/blast_radius.py|\
              src/eedom/plugins/supply_chain.py)
                API_CONTRACT_CHANGES="${API_CONTRACT_CHANGES}${changed_path}"$'\n'
                ;;
            esac
          done <<< "$CHANGED_FILES"

          FULL_E2E_CHANGES=""
          while IFS= read -r changed_path; do
            case "$changed_path" in
              tests/e2e/*|\
              src/eedom/data/scanners/*|\
              src/eedom/core/subprocess_runner.py|\
              src/eedom/core/tool_runner.py|\
              src/eedom/plugins/_runners/*|\
              src/eedom/plugins/cdk_nag.py|\
              src/eedom/plugins/cfn_nag.py|\
              src/eedom/plugins/clamav.py|\
              src/eedom/plugins/complexity.py|\
              src/eedom/plugins/cpd.py|\
              src/eedom/plugins/cspell.py|\
              src/eedom/plugins/gitleaks.py|\
              src/eedom/plugins/kube_linter.py|\
              src/eedom/plugins/ls_lint.py|\
              src/eedom/plugins/mypy.py|\
              src/eedom/plugins/osv_scanner.py|\
              src/eedom/plugins/scancode.py|\
              src/eedom/plugins/semgrep.py|\
              src/eedom/plugins/syft.py|\
              src/eedom/plugins/trivy.py|\
              policies/*|\
              Dockerfile|\
              Dockerfile.test|\
              Makefile|\
              pyproject.toml|\
              uv.lock|\
              .github/workflows/gatekeeper.yml)
                FULL_E2E_CHANGES="${FULL_E2E_CHANGES}${changed_path}"$'\n'
                ;;
            esac
          done <<< "$CHANGED_FILES"
          if [ -n "$API_CONTRACT_CHANGES" ]; then
            echo "api_contract=true" >> "$GITHUB_OUTPUT"
            echo "api_contract_reason=contract_path" >> "$GITHUB_OUTPUT"
            echo "::notice::API contract tests required by contract path changes"
            {
              echo "### API contract tests required"
              echo ""
              echo "Contract-sensitive paths changed:"
              printf '%s\n' "$API_CONTRACT_CHANGES" | sed 's/^/- `/' | sed 's/$/`/'
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$API_CONTRACT_LABEL_PRESENT" = "true" ]; then
            echo "api_contract=true" >> "$GITHUB_OUTPUT"
            echo "api_contract_reason=api-contract-needed_label" >> "$GITHUB_OUTPUT"
            echo "::notice::API contract tests required by api-contract-needed label"
          else
            echo "api_contract=false" >> "$GITHUB_OUTPUT"
            echo "api_contract_reason=not_required" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$FULL_E2E_CHANGES" ]; then
            echo "full_e2e=true" >> "$GITHUB_OUTPUT"
            echo "full_e2e_reason=runtime_path" >> "$GITHUB_OUTPUT"
            echo "::notice::Full e2e required by runtime path changes"
            {
              echo "### Full e2e required"
              echo ""
              echo "Runtime-sensitive paths changed:"
              printf '%s\n' "$FULL_E2E_CHANGES" | sed 's/^/- `/' | sed 's/$/`/'
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "$E2E_LABEL_PRESENT" = "true" ]; then
            echo "full_e2e=true" >> "$GITHUB_OUTPUT"
            echo "full_e2e_reason=e2e-needed_label" >> "$GITHUB_OUTPUT"
            echo "::notice::Full e2e required by e2e-needed label"
          else
            echo "full_e2e=false" >> "$GITHUB_OUTPUT"
            echo "full_e2e_reason=not_required" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          API_CONTRACT_LABEL_PRESENT: ${{ contains(github.event.pull_request.labels.*.name, 'api-contract-needed') }}
          E2E_LABEL_PRESENT: ${{ contains(github.event.pull_request.labels.*.name, 'e2e-needed') }}

  # ── Push to main: stamp release key only (PR already validated) ──

  release-key:
    name: Release Key
    needs: preflight
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Post release key
        run: |
          SHA=$(git rev-parse HEAD)
          TOKEN=$(python3 -c "import hmac,hashlib,os; print(hmac.new(os.environ['RELEASE_UNLOCK_WORD'].encode(), os.environ['KEY_SHA'].encode(), hashlib.sha256).hexdigest())")
          gh api "repos/${REPO}/statuses/${SHA}" \
            --method POST \
            -f state=success \
            -f context=ci/release-key \
            -f description="$TOKEN"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_UNLOCK_WORD: ${{ secrets.RELEASE_UNLOCK_WORD }}
          KEY_SHA: ${{ github.sha }}

  # ── PR parallel jobs ──

  lint:
    name: Lint
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-lint-${{ hashFiles('uv.lock') }}
          restore-keys: uv-lint-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Black check
        run: uv run black --check src/ tests/

  test:
    name: Unit Tests
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-test-${{ hashFiles('uv.lock') }}
          restore-keys: uv-test-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest tests/unit/ -v --tb=short
        env:
          EEDOM_ALLOW_HOST_TESTS: "1"

  api_contract:
    name: API Contract Tests
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          needs.preflight.outputs.api_contract == 'true'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-api-contract-${{ hashFiles('uv.lock') }}
          restore-keys: uv-api-contract-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run API contract tests
        run: uv run pytest tests/contract/ -v --tb=short
        env:
          EEDOM_ALLOW_HOST_TESTS: "1"

  e2e_smoke:
    name: E2E Smoke
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-e2e-smoke-${{ hashFiles('uv.lock') }}
          restore-keys: uv-e2e-smoke-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run smoke e2e tests
        run: uv run pytest tests/e2e/test_smoke_review.py -v --tb=short
        env:
          EEDOM_ALLOW_HOST_TESTS: "1"
          EEDOM_E2E: "1"

  e2e_full:
    name: E2E Full
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          needs.preflight.outputs.full_e2e == 'true'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-e2e-full-${{ hashFiles('uv.lock') }}
          restore-keys: uv-e2e-full-

      - name: Cache scanner binaries
        id: scanner-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/scanner-bin
          key: scanners-${{ env.SCANNER_VERSIONS }}

      - name: Cache trivy DB
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install lizard mypy scancode-toolkit==32.3.0 || true
          npm install -g cspell --no-fund --no-audit || true

      - name: Install scanner binaries
        if: steps.scanner-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$SCANNER_BIN"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz" | tar xz -C "$SCANNER_BIN" trivy || true
          curl -sSfL -o "$SCANNER_BIN/osv-scanner" "https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64" && chmod +x "$SCANNER_BIN/osv-scanner" || true
          curl -sSfL -o "$SCANNER_BIN/kube-linter" "https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux" && chmod +x "$SCANNER_BIN/kube-linter" || true
          curl -sSfL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.9.0/pmd-dist-7.9.0-bin.zip" -o /tmp/pmd.zip && unzip -qo /tmp/pmd.zip -d /tmp && cp /tmp/pmd-bin-7.9.0/bin/pmd "$SCANNER_BIN/pmd" && cp -r /tmp/pmd-bin-7.9.0 "$SCANNER_BIN/pmd-bin-7.9.0" || true
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar xz -C "$SCANNER_BIN" gitleaks || true
          curl -sSfL -o "$SCANNER_BIN/opengrep" "https://github.com/opengrep/opengrep/releases/download/v1.20.0/opengrep_manylinux_x86" && chmod +x "$SCANNER_BIN/opengrep" || true
          curl -sSfL "https://github.com/anchore/syft/releases/download/v1.43.0/syft_1.43.0_linux_amd64.tar.gz" | tar xz -C "$SCANNER_BIN" syft || true

      - name: Add scanners to PATH and warm trivy DB
        run: |
          echo "$SCANNER_BIN" >> "$GITHUB_PATH"
          if [ -f "$SCANNER_BIN/pmd-bin-7.9.0/bin/pmd" ]; then
            echo "$SCANNER_BIN/pmd-bin-7.9.0/bin" >> "$GITHUB_PATH"
          fi
          "$SCANNER_BIN/trivy" fs --download-db-only --cache-dir "$TRIVY_CACHE_DIR" || true

      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v --tb=short
        env:
          EEDOM_ALLOW_HOST_TESTS: "1"
          EEDOM_E2E: "1"

  review:
    name: Dom Review
    needs: preflight
    if: >-
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/uv-cache
          key: uv-review-${{ hashFiles('uv.lock') }}
          restore-keys: uv-review-

      - name: Cache scanner binaries
        id: scanner-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/scanner-bin
          key: scanners-${{ env.SCANNER_VERSIONS }}

      - name: Cache trivy DB
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv pip install lizard mypy
          npm install -g cspell --no-fund --no-audit || true
          uv pip install scancode-toolkit==32.3.0 || true

      - name: Install scanner binaries
        if: steps.scanner-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$SCANNER_BIN"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz" | tar xz -C "$SCANNER_BIN" trivy || true
          curl -sSfL -o "$SCANNER_BIN/osv-scanner" "https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64" && chmod +x "$SCANNER_BIN/osv-scanner" || true
          curl -sSfL -o "$SCANNER_BIN/kube-linter" "https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux" && chmod +x "$SCANNER_BIN/kube-linter" || true
          curl -sSfL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.9.0/pmd-dist-7.9.0-bin.zip" -o /tmp/pmd.zip && unzip -qo /tmp/pmd.zip -d /tmp && cp /tmp/pmd-bin-7.9.0/bin/pmd "$SCANNER_BIN/pmd" && cp -r /tmp/pmd-bin-7.9.0 "$SCANNER_BIN/pmd-bin-7.9.0" || true
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar xz -C "$SCANNER_BIN" gitleaks || true
          curl -sSfL -o "$SCANNER_BIN/opengrep" "https://github.com/opengrep/opengrep/releases/download/v1.20.0/opengrep_manylinux_x86" && chmod +x "$SCANNER_BIN/opengrep" || true
          curl -sSfL "https://github.com/anchore/syft/releases/download/v1.43.0/syft_1.43.0_linux_amd64.tar.gz" | tar xz -C "$SCANNER_BIN" syft || true

      - name: Add scanners to PATH and warm trivy DB
        run: |
          echo "$SCANNER_BIN" >> "$GITHUB_PATH"
          if [ -f "$SCANNER_BIN/pmd-bin-7.9.0/bin/pmd" ]; then
            echo "$SCANNER_BIN/pmd-bin-7.9.0/bin" >> "$GITHUB_PATH"
          fi
          "$SCANNER_BIN/trivy" fs --download-db-only --cache-dir "$TRIVY_CACHE_DIR" || true

      - name: Generate PR diff
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .temp
          git diff "$BASE_SHA"..."$HEAD_SHA" > .temp/pr.diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Run eedom review
        run: |
          DIFF_FLAG=""
          [ -f .temp/pr.diff ] && DIFF_FLAG="--diff .temp/pr.diff"
          mkdir -p .temp
          uv run eedom review --repo-path . --all $DIFF_FLAG --format sarif --output .temp/review.sarif &
          PID_SARIF=$!
          uv run eedom review --repo-path . --all $DIFF_FLAG --output .temp/review.md &
          PID_MD=$!
          wait $PID_SARIF $PID_MD

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: review-output
          path: |
            .temp/review.sarif
            .temp/review.md
          retention-days: 7
          if-no-files-found: ignore

  # ── Gate: verdict + labels + comments (waits for all parallel jobs) ──

  gate:
    name: Gate
    needs: [preflight, lint, test, api_contract, e2e_smoke, e2e_full, review]
    if: >-
      always() &&
      !cancelled() &&
      github.event_name != 'push' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check upstream jobs
        id: upstream
        run: |
          FAILED=""
          [ "$LINT" != "success" ] && FAILED="$FAILED lint($LINT)"
          [ "$TEST" != "success" ] && FAILED="$FAILED test($TEST)"
          [ "$API_CONTRACT" != "success" ] && [ "$API_CONTRACT" != "skipped" ] && FAILED="$FAILED api-contract($API_CONTRACT)"
          [ "$E2E_SMOKE" != "success" ] && FAILED="$FAILED e2e-smoke($E2E_SMOKE)"
          [ "$E2E_FULL" != "success" ] && [ "$E2E_FULL" != "failure" ] && [ "$E2E_FULL" != "skipped" ] && FAILED="$FAILED e2e-full($E2E_FULL)"
          [ "$E2E_FULL" = "failure" ] && echo "::warning::Full e2e tests failed — not blocking gate (scanner binary compat issues on GH runners)"
          [ "$REVIEW" != "success" ] && FAILED="$FAILED review($REVIEW)"

          if [ -n "$FAILED" ]; then
            echo "::error::Upstream jobs failed:$FAILED"
            echo "upstream_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "upstream_ok=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          API_CONTRACT: ${{ needs.api_contract.result }}
          E2E_SMOKE: ${{ needs.e2e_smoke.result }}
          E2E_FULL: ${{ needs.e2e_full.result }}
          REVIEW: ${{ needs.review.result }}

      - name: Download review artifacts
        if: needs.review.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: review-output
          path: .temp/

      - name: Compute verdict
        id: verdict
        run: |
          python3 << 'VERDICT_SCRIPT'
          import json, os, re

          out_path = os.environ["GITHUB_OUTPUT"]
          errors = 0
          warnings = 0
          crashed = 0
          skipped = 0
          total = 0

          sarif_path = ".temp/review.sarif"
          md_path = ".temp/review.md"

          if os.path.isfile(sarif_path):
              with open(sarif_path) as f:
                  sarif = json.load(f)
              runs = sarif.get("runs", [])
              total = len(runs)
              for r in runs:
                  plugin_errored = False
                  for res in r.get("results", []):
                      if res.get("ruleId") == "eedom-plugin-error":
                          crashed += 1
                          plugin_errored = True
                          break
                  if plugin_errored:
                      continue
                  for res in r.get("results", []):
                      if res.get("level") == "error":
                          errors += 1
                      elif res.get("level") == "warning":
                          warnings += 1

          if os.path.isfile(md_path):
              with open(md_path) as mf:
                  md = mf.read()
              if crashed == 0:
                  crashed = len(re.findall(r"BINARY_CRASHED", md))
              skipped = len(re.findall(r"NOT_INSTALLED", md))
              timed_out = len(re.findall(r"\[TIMEOUT\]", md))
              warnings += timed_out

          if crashed > 0:
              verdict = "warnings"
          elif errors > 0:
              verdict = "blocked"
          elif warnings > 0 or skipped > 0:
              verdict = "warnings"
          else:
              verdict = "approved"

          with open(out_path, "a") as out:
              out.write(f"errors={errors}\n")
              out.write(f"warnings={warnings}\n")
              out.write(f"crashed={crashed}\n")
              out.write(f"skipped={skipped}\n")
              out.write(f"total_plugins={total}\n")
              out.write(f"verdict={verdict}\n")
          VERDICT_SCRIPT

      - name: Set dom label
        if: github.event_name == 'pull_request' && steps.upstream.outputs.upstream_ok == 'true'
        run: |
          for LABEL in "dom: approved" "dom: warnings" "dom: blocked"; do
            gh issue edit "$PR_NUM" --remove-label "$LABEL" 2>/dev/null || true
          done

          gh issue edit "$PR_NUM" --add-label "dom: $VERDICT"

          echo "## dom: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Lint:** ${{ needs.lint.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tests:** ${{ needs.test.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API contract:** ${{ needs.api_contract.result }} (${{ needs.preflight.outputs.api_contract_reason }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **E2E smoke:** ${{ needs.e2e_smoke.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **E2E full:** ${{ needs.e2e_full.result }} (${{ needs.preflight.outputs.full_e2e_reason }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Review errors (critical/high):** $ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Review warnings (medium):** $WARNINGS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Skipped plugins (not installed):** $SKIPPED" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Crashed plugins:** $CRASHED" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}
          SKIPPED: ${{ steps.verdict.outputs.skipped }}
          CRASHED: ${{ steps.verdict.outputs.crashed }}

      - name: Post review comment
        if: github.event_name == 'pull_request' && needs.review.result == 'success'
        run: |
          if [ ! -s .temp/review.md ]; then
            echo "No review output — skipping comment."
            exit 0
          fi

          ICON="✅"
          if [ "$VERDICT" = "blocked" ]; then ICON="🚫"; fi
          if [ "$VERDICT" = "warnings" ]; then ICON="⚠️"; fi

          MARKER="<!-- eedom-review -->"
          EXTRA=""
          if [ "${CRASHED:-0}" -ge 1 ]; then
            EXTRA="$EXTRA | ${CRASHED} plugin(s) crashed"
          fi
          if [ "${SKIPPED:-0}" -ge 1 ]; then
            EXTRA="$EXTRA | ${SKIPPED} plugin(s) not installed"
          fi
          CI_NOTE=""
          if [ "$UPSTREAM_OK" != "true" ]; then
            CI_NOTE="
          > **CI failed** — lint or tests did not pass. Dom review below is independent of CI status."
          fi
          BODY="${MARKER}
          ${ICON} **dom: ${VERDICT}** — ${ERRORS} error(s), ${WARNINGS} warning(s)${EXTRA}
          ${CI_NOTE}
          <details>
          <summary>Full review</summary>

          $(cat .temp/review.md)

          </details>"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$BODY" > /dev/null
            echo "Updated existing comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body "$BODY"
            echo "Posted new comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}
          SKIPPED: ${{ steps.verdict.outputs.skipped }}
          CRASHED: ${{ steps.verdict.outputs.crashed }}
          UPSTREAM_OK: ${{ steps.upstream.outputs.upstream_ok }}

      - name: Hand off to Copilot
        if: github.event_name == 'pull_request'
        run: |
          MARKER="<!-- eedom-copilot-handoff -->"
          HANDOFF="${MARKER}
          **Copilot context from Eagle Eyed Dom:**

          Dom scanned this PR with 18 deterministic plugins:
          - **${ERRORS} error-level** findings (critical/high)
          - **${WARNINGS} warning-level** findings (medium)
          - **Verdict: ${VERDICT}**

          Dom already covers: CVEs, licenses, secrets, supply chain, complexity, duplication, spelling, naming conventions, K8s, AST patterns, blast radius, OPA policy.

          **Your focus:** business logic, API design, concurrency, error handling strategy, performance, test quality, authz/authn, migration safety, backwards compat.

          Full instructions: \`.github/copilot-review-instructions.md\`"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$HANDOFF" > /dev/null
          else
            gh pr comment "$PR_NUM" --body "$HANDOFF"
          fi

          if gh pr edit "$PR_NUM" --add-reviewer @copilot 2>/dev/null; then
            gh issue edit "$PR_NUM" --remove-label "dom: needs-copilot" 2>/dev/null || true
          else
            gh issue edit "$PR_NUM" --add-label "dom: needs-copilot"
            gh pr comment "$PR_NUM" --body "⚠️ **Could not request Copilot review.** The workflow token lacks permission to add reviewers. Run manually: \`gh pr edit $PR_NUM --add-reviewer @copilot\`"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}

      - name: Gitleaks PII scan
        if: always()
        run: |
          if command -v gitleaks &>/dev/null; then
            CONFIG_FLAG=""
            [ -f ".eedom/gitleaks.toml" ] && CONFIG_FLAG="--config .eedom/gitleaks.toml"
            gitleaks detect --log-opts "--all -1" $CONFIG_FLAG
          else
            echo "gitleaks not installed on GH runner — skipping"
          fi

      - name: Post release key
        if: success() && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)
        run: |
          SHA=$(git rev-parse HEAD)
          TOKEN=$(python3 -c "import hmac,hashlib,os; print(hmac.new(os.environ['RELEASE_UNLOCK_WORD'].encode(), os.environ['KEY_SHA'].encode(), hashlib.sha256).hexdigest())")
          gh api "repos/${REPO}/statuses/${SHA}" \
            --method POST \
            -f state=success \
            -f context=ci/release-key \
            -f description="$TOKEN"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_UNLOCK_WORD: ${{ secrets.RELEASE_UNLOCK_WORD }}
          KEY_SHA: ${{ github.sha }}

      - name: Fail-closed gate
        if: always()
        run: |
          if [ "${{ steps.upstream.outputs.upstream_ok }}" != "true" ]; then
            echo "::error::GATEKEEPER fail-closed — upstream job(s) failed (lint=${{ needs.lint.result }}, test=${{ needs.test.result }}, api_contract=${{ needs.api_contract.result }}, e2e_smoke=${{ needs.e2e_smoke.result }}, e2e_full=${{ needs.e2e_full.result }}, review=${{ needs.review.result }})"
            exit 1
          fi

          VERDICT="${{ steps.verdict.outputs.verdict }}"
          CRASHED="${{ steps.verdict.outputs.crashed }}"
          ERRORS="${{ steps.verdict.outputs.errors }}"

          if [ "$VERDICT" = "blocked" ]; then
            echo "::error::GATEKEEPER fail-closed — verdict: ${VERDICT} (${CRASHED} crashed, ${ERRORS} errors)"
            exit 1
          fi
