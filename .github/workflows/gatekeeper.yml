name: GATEKEEPER — Dependency & Code Review

on:
  pull_request:
    paths:
      # Python
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "Pipfile*"
      # JavaScript/TypeScript
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      # Rust
      - "Cargo.toml"
      - "Cargo.lock"
      # Go
      - "go.mod"
      - "go.sum"
      # Ruby
      - "Gemfile"
      - "Gemfile.lock"
      # .NET
      - "*.csproj"
      - "packages.config"
      - "Directory.Packages.props"
      # Dart/Flutter
      - "pubspec.yaml"
      - "pubspec.lock"
      # PHP
      - "composer.json"
      - "composer.lock"
      # Elixir
      - "mix.exs"
      - "mix.lock"
      # Source code (for Semgrep)
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.go"
      - "**/*.rs"
      - "**/*.java"
      - "**/*.rb"

  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Enforcement mode (block, warn, log)"
        required: false
        default: "warn"
        type: choice
        options:
          - block
          - warn
          - log

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  gatekeeper:
    name: GATEKEEPER Review
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect runtime
        id: runtime
        run: |
          # Check podman is installed AND responsive (machine running, image pullable)
          if command -v podman &>/dev/null && podman info &>/dev/null && podman image exists eedom:latest &>/dev/null; then
            echo "engine=podman" >> "$GITHUB_OUTPUT"
            echo "container=true" >> "$GITHUB_OUTPUT"
          elif command -v docker &>/dev/null && docker info &>/dev/null && docker image inspect eedom:latest &>/dev/null; then
            echo "engine=docker" >> "$GITHUB_OUTPUT"
            echo "container=true" >> "$GITHUB_OUTPUT"
          else
            echo "engine=native" >> "$GITHUB_OUTPUT"
            echo "container=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (native)
        if: steps.runtime.outputs.container == 'false'
        run: uv sync --group dev

      - name: Generate PR diff
        id: diff
        run: |
          mkdir -p .temp
          git diff "$BASE_SHA"..."$HEAD_SHA" > .temp/pr.diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Run eedom review (container)
        if: steps.runtime.outputs.container == 'true'
        run: |
          ENGINE="${{ steps.runtime.outputs.engine }}"
          $ENGINE run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -v "$GITHUB_WORKSPACE/.temp:/workspace/.temp" \
            eedom:latest \
            sh -c "set -e && eedom review --repo-path /workspace --all --format sarif --output /workspace/.temp/review.sarif && eedom review --repo-path /workspace --all --output /workspace/.temp/review.md"

      - name: Run eedom review (native)
        if: steps.runtime.outputs.container == 'false'
        run: |
          set -e
          uv run eedom review --repo-path . --all --format sarif --output .temp/review.sarif
          uv run eedom review --repo-path . --all --output .temp/review.md

      - name: Compute verdict
        id: verdict
        run: |
          ERRORS=0
          WARNINGS=0
          if [ -f .temp/review.sarif ]; then
            ERRORS=$(python3 -c "
          import json
          with open('.temp/review.sarif') as f:
              sarif = json.load(f)
          print(sum(1 for r in sarif.get('runs',[]) for res in r.get('results',[]) if res.get('level')=='error'))
          " 2>/dev/null || echo "0")

            WARNINGS=$(python3 -c "
          import json
          with open('.temp/review.sarif') as f:
              sarif = json.load(f)
          print(sum(1 for r in sarif.get('runs',[]) for res in r.get('results',[]) if res.get('level')=='warning'))
          " 2>/dev/null || echo "0")
          fi

          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"

          if [ "$ERRORS" -gt 0 ]; then
            echo "verdict=blocked" >> "$GITHUB_OUTPUT"
          elif [ "$WARNINGS" -gt 0 ]; then
            echo "verdict=warnings" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=approved" >> "$GITHUB_OUTPUT"
          fi

          echo "Runtime: ${{ steps.runtime.outputs.engine }} | Errors: $ERRORS | Warnings: $WARNINGS"

      - name: Set dom label
        if: github.event_name == 'pull_request'
        run: |
          for LABEL in "dom: approved" "dom: warnings" "dom: blocked"; do
            gh issue edit "$PR_NUM" --remove-label "$LABEL" 2>/dev/null || true
          done

          gh issue edit "$PR_NUM" --add-label "dom: $VERDICT"

          echo "## dom: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runtime:** ${{ steps.runtime.outputs.engine }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Errors (critical/high):** $ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Warnings (medium):** $WARNINGS" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}

      - name: Post review comment
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s .temp/review.md ]; then
            echo "No review output — skipping comment."
            exit 0
          fi

          ICON="✅"
          if [ "$VERDICT" = "blocked" ]; then ICON="🚫"; fi
          if [ "$VERDICT" = "warnings" ]; then ICON="⚠️"; fi

          MARKER="<!-- eedom-review -->"
          BODY="${MARKER}
          ${ICON} **dom: ${VERDICT}** — ${ERRORS} error(s), ${WARNINGS} warning(s)

          <details>
          <summary>Full review</summary>

          $(cat .temp/review.md)

          </details>"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$BODY" > /dev/null
            echo "Updated existing comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body "$BODY"
            echo "Posted new comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}

      - name: Hand off to Copilot
        if: github.event_name == 'pull_request'
        run: |
          MARKER="<!-- eedom-copilot-handoff -->"
          HANDOFF="${MARKER}
          **Copilot context from Eagle Eyed Dom:**

          Dom scanned this PR with 15 deterministic plugins:
          - **${ERRORS} error-level** findings (critical/high)
          - **${WARNINGS} warning-level** findings (medium)
          - **Verdict: ${VERDICT}**

          Dom already covers: CVEs, licenses, secrets, supply chain, complexity, duplication, spelling, naming conventions, K8s, AST patterns, blast radius, OPA policy.

          **Your focus:** business logic, API design, concurrency, error handling strategy, performance, test quality, authz/authn, migration safety, backwards compat.

          Full instructions: \`.github/copilot-review-instructions.md\`"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$HANDOFF" > /dev/null
          else
            gh pr comment "$PR_NUM" --body "$HANDOFF"
          fi

          gh pr edit "$PR_NUM" --add-reviewer @copilot
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}
