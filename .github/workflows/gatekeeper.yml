name: GATEKEEPER — Dependency & Code Review

on:
  pull_request:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Enforcement mode (block, warn, log)"
        required: false
        default: "warn"
        type: choice
        options:
          - block
          - warn
          - log

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  gatekeeper:
    name: GATEKEEPER Review
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect runtime
        id: runtime
        run: |
          # Check podman is installed AND responsive (machine running, image pullable)
          if command -v podman &>/dev/null && podman info &>/dev/null && podman image exists eedom:latest &>/dev/null; then
            echo "engine=podman" >> "$GITHUB_OUTPUT"
            echo "container=true" >> "$GITHUB_OUTPUT"
          elif command -v docker &>/dev/null && docker info &>/dev/null && docker image inspect eedom:latest &>/dev/null; then
            echo "engine=docker" >> "$GITHUB_OUTPUT"
            echo "container=true" >> "$GITHUB_OUTPUT"
          else
            echo "engine=native" >> "$GITHUB_OUTPUT"
            echo "container=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (native)
        if: steps.runtime.outputs.container == 'false'
        run: uv sync --group dev

      - name: Generate PR diff
        id: diff
        run: |
          mkdir -p .temp
          git diff "$BASE_SHA"..."$HEAD_SHA" > .temp/pr.diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Run eedom review (container)
        if: steps.runtime.outputs.container == 'true'
        run: |
          ENGINE="${{ steps.runtime.outputs.engine }}"
          $ENGINE run --rm --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -v "$GITHUB_WORKSPACE/.temp:/workspace/.temp" \
            eedom:latest \
            sh -c "set -e && eedom review --repo-path /workspace --all --format sarif --output /workspace/.temp/review.sarif && eedom review --repo-path /workspace --all --output /workspace/.temp/review.md"

      - name: Run eedom review (native)
        if: steps.runtime.outputs.container == 'false'
        run: |
          set -e
          uv run eedom review --repo-path . --all --format sarif --output .temp/review.sarif
          uv run eedom review --repo-path . --all --output .temp/review.md

      - name: Compute verdict
        id: verdict
        run: |
          ERRORS=0
          WARNINGS=0
          CRASHED=0
          TOTAL_PLUGINS=0
          if [ -f .temp/review.sarif ]; then
            python3 -c "
          import json, os
          with open('.temp/review.sarif') as f:
              sarif = json.load(f)
          runs = sarif.get('runs', [])
          total = len(runs)
          errors = sum(1 for r in runs for res in r.get('results', []) if res.get('level') == 'error')
          warnings = sum(1 for r in runs for res in r.get('results', []) if res.get('level') == 'warning')
          crashed = sum(1 for r in runs if any(
              'NOT_INSTALLED' in res.get('message', {}).get('text', '') or
              'TIMEOUT' in res.get('message', {}).get('text', '') or
              'Read-only file system' in res.get('message', {}).get('text', '')
              for res in r.get('results', [])
          ))
          # Also count runs with zero results and error in tool name as crashed
          crashed += sum(1 for r in runs if len(r.get('results', [])) == 0 and r.get('tool', {}).get('driver', {}).get('name', '') not in ('opa',))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'errors={errors}\n')
              out.write(f'warnings={warnings}\n')
              out.write(f'crashed={crashed}\n')
              out.write(f'total_plugins={total}\n')
          " 2>/dev/null || {
              echo "errors=0" >> "$GITHUB_OUTPUT"
              echo "warnings=0" >> "$GITHUB_OUTPUT"
              echo "crashed=0" >> "$GITHUB_OUTPUT"
              echo "total_plugins=0" >> "$GITHUB_OUTPUT"
          }
          fi

          ERRORS="${{ steps.verdict.outputs.errors }}"
          WARNINGS="${{ steps.verdict.outputs.warnings }}"
          CRASHED="${{ steps.verdict.outputs.crashed }}"
          TOTAL="${{ steps.verdict.outputs.total_plugins }}"

          if [ "$ERRORS" -gt 0 ]; then
            echo "verdict=blocked" >> "$GITHUB_OUTPUT"
          elif [ "${CRASHED:-0}" -ge 3 ]; then
            echo "verdict=incomplete" >> "$GITHUB_OUTPUT"
          elif [ "$WARNINGS" -gt 0 ]; then
            echo "verdict=warnings" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=approved" >> "$GITHUB_OUTPUT"
          fi

          echo "Runtime: ${{ steps.runtime.outputs.engine }} | Errors: ${ERRORS:-0} | Warnings: ${WARNINGS:-0} | Crashed: ${CRASHED:-0}/${TOTAL:-0} plugins"

      - name: Set dom label
        if: github.event_name == 'pull_request'
        run: |
          for LABEL in "dom: approved" "dom: warnings" "dom: blocked" "dom: incomplete"; do
            gh issue edit "$PR_NUM" --remove-label "$LABEL" 2>/dev/null || true
          done

          gh issue edit "$PR_NUM" --add-label "dom: $VERDICT"

          echo "## dom: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Runtime:** ${{ steps.runtime.outputs.engine }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Errors (critical/high):** $ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Warnings (medium):** $WARNINGS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Crashed plugins:** $CRASHED" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}
          CRASHED: ${{ steps.verdict.outputs.crashed }}

      - name: File issue on incomplete review
        if: github.event_name == 'pull_request' && steps.verdict.outputs.verdict == 'incomplete'
        run: |
          TITLE="[eedom-crash] ${CRASHED} plugin(s) crashed reviewing PR #${PR_NUM}"
          EXISTING=$(gh issue list --search "\"$TITLE\" in:title" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --label "bug" \
              --body "## Eedom review incomplete

          **PR:** #${PR_NUM} (${{ github.event.pull_request.html_url }})
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Crashed plugins:** ${CRASHED} out of ${TOTAL} total

          The review passed with \`dom: incomplete\` because too many plugins failed to produce results. This means the PR has no meaningful security/quality signal from eedom.

          ### Action required
          1. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) logs for NOT_INSTALLED / TIMEOUT / filesystem errors
          2. Fix the runner environment or container image
          3. Re-run the workflow on PR #${PR_NUM}

          Until this is resolved, PR #${PR_NUM} should not be merged — the \`dom: incomplete\` label blocks it."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          CRASHED: ${{ steps.verdict.outputs.crashed }}
          TOTAL: ${{ steps.verdict.outputs.total_plugins }}

      - name: Post review comment
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s .temp/review.md ]; then
            echo "No review output — skipping comment."
            exit 0
          fi

          ICON="✅"
          if [ "$VERDICT" = "blocked" ]; then ICON="🚫"; fi
          if [ "$VERDICT" = "warnings" ]; then ICON="⚠️"; fi
          if [ "$VERDICT" = "incomplete" ]; then ICON="🟣"; fi

          MARKER="<!-- eedom-review -->"
          CRASHED_NOTE=""
          if [ "${CRASHED:-0}" -ge 1 ]; then
            CRASHED_NOTE=" | ${CRASHED} plugin(s) crashed"
          fi
          BODY="${MARKER}
          ${ICON} **dom: ${VERDICT}** — ${ERRORS} error(s), ${WARNINGS} warning(s)${CRASHED_NOTE}

          <details>
          <summary>Full review</summary>

          $(cat .temp/review.md)

          </details>"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$BODY" > /dev/null
            echo "Updated existing comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body "$BODY"
            echo "Posted new comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}

      - name: Hand off to Copilot
        if: github.event_name == 'pull_request'
        run: |
          MARKER="<!-- eedom-copilot-handoff -->"
          HANDOFF="${MARKER}
          **Copilot context from Eagle Eyed Dom:**

          Dom scanned this PR with 15 deterministic plugins:
          - **${ERRORS} error-level** findings (critical/high)
          - **${WARNINGS} warning-level** findings (medium)
          - **Verdict: ${VERDICT}**

          Dom already covers: CVEs, licenses, secrets, supply chain, complexity, duplication, spelling, naming conventions, K8s, AST patterns, blast radius, OPA policy.

          **Your focus:** business logic, API design, concurrency, error handling strategy, performance, test quality, authz/authn, migration safety, backwards compat.

          Full instructions: \`.github/copilot-review-instructions.md\`"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$HANDOFF" > /dev/null
          else
            gh pr comment "$PR_NUM" --body "$HANDOFF"
          fi

          if gh pr edit "$PR_NUM" --add-reviewer @copilot 2>/dev/null; then
            gh issue edit "$PR_NUM" --remove-label "dom: needs-copilot" 2>/dev/null || true
          else
            gh issue edit "$PR_NUM" --add-label "dom: needs-copilot"
            gh pr comment "$PR_NUM" --body "⚠️ **Could not request Copilot review.** The workflow token lacks permission to add reviewers. Run manually: \`gh pr edit $PR_NUM --add-reviewer @copilot\`"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          ERRORS: ${{ steps.verdict.outputs.errors }}
          WARNINGS: ${{ steps.verdict.outputs.warnings }}

      - name: Gitleaks PII scan
        if: always()
        run: |
          if command -v gitleaks &>/dev/null; then
            CONFIG_FLAG=""
            [ -f ".eedom/gitleaks.toml" ] && CONFIG_FLAG="--config .eedom/gitleaks.toml"
            gitleaks detect --log-opts "--all -1" $CONFIG_FLAG
          else
            echo "gitleaks not installed — skipping"
          fi

      - name: Post release key
        if: success()
        run: |
          SHA=$(git rev-parse HEAD)
          TOKEN=$(python3 -c "import hmac,hashlib; print(hmac.new('$RELEASE_UNLOCK_WORD'.encode(), '$SHA'.encode(), hashlib.sha256).hexdigest())")
          gh api repos/${{ github.repository }}/statuses/"$SHA" \
            --method POST \
            -f state=success \
            -f context=ci/release-key \
            -f description="$TOKEN"
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_UNLOCK_WORD: ${{ secrets.RELEASE_UNLOCK_WORD }}
