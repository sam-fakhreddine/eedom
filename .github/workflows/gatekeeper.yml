name: GATEKEEPER — Dependency & Code Review

on:
  pull_request:
    paths:
      # Python
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - "Pipfile*"
      # JavaScript/TypeScript
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      # Rust
      - "Cargo.toml"
      - "Cargo.lock"
      # Go
      - "go.mod"
      - "go.sum"
      # Ruby
      - "Gemfile"
      - "Gemfile.lock"
      # .NET
      - "*.csproj"
      - "packages.config"
      - "Directory.Packages.props"
      # Dart/Flutter
      - "pubspec.yaml"
      - "pubspec.lock"
      # PHP
      - "composer.json"
      - "composer.lock"
      # Elixir
      - "mix.exs"
      - "mix.lock"
      # Source code (for Semgrep)
      - "**/*.py"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.go"
      - "**/*.rs"
      - "**/*.java"
      - "**/*.rb"

  workflow_dispatch:
    inputs:
      enforcement_mode:
        description: "Enforcement mode (block, warn, log)"
        required: false
        default: "warn"
        type: choice
        options:
          - block
          - warn
          - log

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  gatekeeper:
    name: GATEKEEPER Review
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate PR diff
        id: diff
        run: |
          mkdir -p .temp
          git diff "$BASE_SHA"..."$HEAD_SHA" > .temp/pr.diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Run eedom review
        id: review
        run: |
          uv run eedom review --repo-path . --all --format sarif --output .temp/review.sarif
          uv run eedom review --repo-path . --all --output .temp/review.md || true

          ERRORS=0
          WARNINGS=0
          if [ -f .temp/review.sarif ]; then
            ERRORS=$(python3 -c "
          import json
          with open('.temp/review.sarif') as f:
              sarif = json.load(f)
          print(sum(1 for r in sarif.get('runs',[]) for res in r.get('results',[]) if res.get('level')=='error'))
          " 2>/dev/null || echo "0")

            WARNINGS=$(python3 -c "
          import json
          with open('.temp/review.sarif') as f:
              sarif = json.load(f)
          print(sum(1 for r in sarif.get('runs',[]) for res in r.get('results',[]) if res.get('level')=='warning'))
          " 2>/dev/null || echo "0")
          fi

          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"

          if [ "$ERRORS" -gt 0 ]; then
            echo "verdict=blocked" >> "$GITHUB_OUTPUT"
          elif [ "$WARNINGS" -gt 0 ]; then
            echo "verdict=warnings" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=approved" >> "$GITHUB_OUTPUT"
          fi

      - name: Set dom label
        if: github.event_name == 'pull_request'
        run: |
          # Remove any existing dom labels
          for LABEL in "dom: approved" "dom: warnings" "dom: blocked"; do
            gh issue edit "$PR_NUM" --remove-label "$LABEL" 2>/dev/null || true
          done

          # Apply the verdict label
          gh issue edit "$PR_NUM" --add-label "dom: $VERDICT"

          echo "## 🏷️ dom: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Errors (critical/high):** $ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Warnings (medium):** $WARNINGS" >> "$GITHUB_STEP_SUMMARY"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.review.outputs.verdict }}
          ERRORS: ${{ steps.review.outputs.errors }}
          WARNINGS: ${{ steps.review.outputs.warnings }}

      - name: Post review comment
        if: github.event_name == 'pull_request'
        run: |
          if [ ! -s .temp/review.md ]; then
            echo "No review output — skipping comment."
            exit 0
          fi

          ICON="✅"
          if [ "$VERDICT" = "blocked" ]; then ICON="🚫"; fi
          if [ "$VERDICT" = "warnings" ]; then ICON="⚠️"; fi

          MARKER="<!-- eedom-review -->"
          BODY="${MARKER}
          ${ICON} **dom: ${VERDICT}** — ${ERRORS} error(s), ${WARNINGS} warning(s)

          <details>
          <summary>Full review</summary>

          $(cat .temp/review.md)

          </details>"

          EXISTING=$(gh api "repos/${REPO}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" \
              --method PATCH --field body="$BODY" > /dev/null
            echo "Updated existing comment $EXISTING"
          else
            gh pr comment "$PR_NUM" --body "$BODY"
            echo "Posted new comment"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.review.outputs.verdict }}
          ERRORS: ${{ steps.review.outputs.errors }}
          WARNINGS: ${{ steps.review.outputs.warnings }}
