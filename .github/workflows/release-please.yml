name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  statuses: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        run: |
          PR_NUM=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          if [ "$PR_NUM" != "null" ] && [ -n "$PR_NUM" ]; then
            gh pr merge "$PR_NUM" --auto --rebase || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-key:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release key
        run: |
          SHA=$(git rev-parse HEAD)
          STORED=$(gh api repos/${{ github.repository }}/commits/"$SHA"/status \
            --jq '[.statuses[] | select(.context == "ci/release-key")] | first | .description')
          if [ -z "$STORED" ] || [ "$STORED" = "null" ]; then
            echo "ERROR: No ci/release-key status found for $SHA — blocking publication" >&2
            exit 1
          fi
          EXPECTED=$(python3 -c "import hmac,hashlib,os; print(hmac.new(os.environ['RELEASE_UNLOCK_WORD'].encode(), os.environ['VERIFY_SHA'].encode(), hashlib.sha256).hexdigest())")
          if [ "$STORED" = "$EXPECTED" ]; then
            echo "VERIFIED"
          else
            echo "MISMATCH" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_UNLOCK_WORD: ${{ secrets.RELEASE_UNLOCK_WORD }}
          VERIFY_SHA: ${{ github.sha }}

  publish:
    needs: [release-please, verify-key]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/eedom/
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Build
        run: uv build

      - name: Generate SBOM
        run: |
          uv tool install cyclonedx-bom --force
          cyclonedx-py environment -o sbom.cdx.json --of json

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*

      - name: Upload stable release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stable-release-${{ needs.release-please.outputs.tag_name }}
          path: |
            dist/*
            sbom.cdx.json
          retention-days: 30
          if-no-files-found: error

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
