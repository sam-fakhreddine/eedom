services:
  postgres:
    image: postgres:16
    container_name: eedom-postgres
    environment:
      POSTGRES_DB: eedom
      POSTGRES_USER: eedom
      POSTGRES_PASSWORD: eedom_dev
    ports:
      - "12432:5432"
    volumes:
      - eedom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eedom -d eedom"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  eedom_pgdata:
